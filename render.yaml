services:
  - type: web
    name: story-generator
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: IMAGE_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: story-generator-db
          property: connectionString

databases:
  - name: story-generator-db
    plan: free
