<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>故事游戏生成器</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app-shell">

<!-- 输入页 -->
<div id="editor-view" class="view active">
  <div class="editor-container">
    <h1 class="logo">故事引擎</h1>
    <p class="subtitle">输入文本或粘贴链接，AI 为你生成可玩的视觉小说</p>
    <a href="/games" style="font-size:11px;color:var(--text2);letter-spacing:1px;text-decoration:none;margin-bottom:8px;margin-top:-16px;align-self:flex-end" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text2)'">我的故事 →</a>

    <!-- 画面风格选择 -->
    <div class="style-selector">
      <div class="style-label">画面风格</div>
      <div class="style-options">
        <button class="style-opt active" data-style="pixel">
          <span class="style-icon">🎮</span>
          <span class="style-name">像素风</span>
        </button>
        <button class="style-opt" data-style="anime">
          <span class="style-icon">✨</span>
          <span class="style-name">动漫风</span>
        </button>
        <button class="style-opt" data-style="ink">
          <span class="style-icon">🖌</span>
          <span class="style-name">水墨风</span>
        </button>
        <button class="style-opt" data-style="realistic">
          <span class="style-icon">📷</span>
          <span class="style-name">写实风</span>
        </button>
        <button class="style-opt" data-style="oil">
          <span class="style-icon">🎨</span>
          <span class="style-name">油画风</span>
        </button>
      </div>
    </div>

    <div class="input-tabs">
      <button class="tab active" data-tab="text">输入文本</button>
      <button class="tab" data-tab="url">粘贴链接</button>
    </div>
    <div class="tab-panel active" id="panel-text">
      <textarea id="story-text" placeholder="在这里输入你的故事、文章、剧情梗概……&#10;&#10;可以是一段小说、一篇新闻、一个创意想法，AI 会自动将其转化为视觉小说游戏。"></textarea>
    </div>
    <div class="tab-panel" id="panel-url">
      <div class="url-row">
        <input type="url" id="story-url" placeholder="https://example.com/article" oninput="onUrlInput(this.value)">
        <button id="btn-fetch" onclick="fetchUrl()">抓取</button>
      </div>
      <div id="url-preview" class="url-preview hidden"></div>
      <!-- 豆瓣阅读专用提示 -->
      <div id="douban-hint" class="douban-hint hidden">
        <div class="douban-hint-title">📖 豆瓣阅读需要书签工具</div>
        <div class="douban-hint-body">
          豆瓣阅读内容需要登录后才能访问，无法直接抓取。<br>
          请将下方按钮拖到浏览器书签栏，然后在豆瓣阅读页面点击它，内容会自动导入。
        </div>
        <a id="douban-bookmarklet" class="douban-bm-btn" href="#" title="拖到书签栏">📥 导入到故事引擎</a>
        <div class="douban-hint-steps">
          <span>① 拖拽上方按钮到书签栏</span>
          <span>② 打开豆瓣阅读章节页面</span>
          <span>③ 点击书签，内容自动填入</span>
        </div>
      </div>
    </div>
    <button id="btn-generate" class="btn-generate" onclick="generate()">
      <span class="btn-text">生成游戏</span>
      <span class="btn-loading hidden">生成中<span class="dots"></span></span>
    </button>
    <p id="error-msg" class="error hidden"></p>
  </div>
</div>

<!-- 游戏页 -->
<div id="game-view" class="view">

  <!-- 全屏背景图层 -->
  <div id="pixel-scene" class="pixel-scene">
    <img id="scene-bg" class="scene-bg" src="" alt="">
    <div id="bg-loading" class="bg-loading hidden">生成场景图<span class="dots"></span></div>
    <img id="char-portrait" class="char-portrait hidden" src="" alt="">
  </div>

  <!-- 顶部 HUD -->
  <div class="dialog-topbar">
    <span id="game-title" class="game-title"></span>
    <span id="game-chapter" class="game-chapter"></span>
    <button class="btn-share" onclick="shareGame()" title="分享游戏">⬆ 分享</button>
  </div>

  <!-- 浮层插图 -->
  <div id="panel-overlay" class="panel-overlay hidden">
    <img id="panel-img" src="" alt="">
    <div id="panel-caption" class="panel-caption"></div>
  </div>

  <!-- 档案卡覆盖层 -->
  <div id="card-overlay" class="card-overlay hidden" onclick="closeCard()">
    <div class="card-inner" onclick="event.stopPropagation()">
      <div class="card-header">
        <span class="card-label">档案</span>
        <button class="card-close" onclick="closeCard()">✕</button>
      </div>
      <div id="card-title" class="card-title"></div>
      <div id="card-text" class="card-text"></div>
      <div id="card-teaser" class="card-teaser"></div>
      <button class="card-btn" onclick="closeCard()">收起档案 ▶</button>
    </div>
  </div>

  <!-- 英雄时刻覆盖层 -->
  <div id="hero-overlay" class="hero-overlay hidden" onclick="closeHero()">
    <div id="hero-title" class="hero-title"></div>
    <div id="hero-subtitle" class="hero-subtitle"></div>
    <div class="hero-tap">点击继续</div>
  </div>

  <!-- 抽卡覆盖层 -->
  <div id="gacha-overlay" class="gacha-overlay hidden">
    <div id="gacha-question" class="gacha-question"></div>
    <div id="gacha-card" class="gacha-card">
      <div class="gacha-card-inner">
        <div class="gacha-card-front">？</div>
        <div id="gacha-card-back" class="gacha-card-back"></div>
      </div>
    </div>
    <button id="gacha-btn" class="gacha-btn" onclick="doGacha()">抽取命运</button>
    <button id="gacha-next" class="gacha-next hidden" onclick="closeGacha()">继续 ▶</button>
  </div>

  <!-- 底部对话区（叠加在背景上） -->
  <div class="dialog-area" id="dialog-box-area">
    <div class="dialog-box" id="dialog-box">
      <div class="dialog-speaker" id="dialog-speaker"></div>
      <div class="dialog-text" id="dialog-text"></div>
    </div>
    <div id="game-choices" class="game-choices hidden"></div>
    <div id="tap-hint" class="tap-hint hidden">▶</div>
  </div>

  <!-- 结局页 -->
  <div id="game-end" class="game-end hidden">
    <div class="end-card">
      <p class="end-label">═ 故事结束 ═</p>
      <div id="end-title" class="end-title"></div>
      <div id="end-text" class="end-text"></div>
      <div class="end-btns">
        <button onclick="restartGame()">重新开始</button>
        <button onclick="backToEditor()">返回编辑</button>
      </div>
    </div>
  </div>

  <!-- 封面页 -->
  <div id="cover-view">
    <img id="cover-bg" class="cover-bg" src="" alt="">
    <div class="cover-vignette"></div>
    <div class="cover-body">
      <div class="cover-label">互动视觉小说</div>
      <div id="cover-title" class="cover-title">故事引擎</div>
      <div id="cover-subtitle" class="cover-subtitle"></div>
      <button class="cover-btn" onclick="enterGame()">开始游戏</button>
      <div class="cover-tap">点击任意处进入</div>
    </div>
  </div>
</div><!-- end #game-view -->
</div><!-- end #app-shell -->

<script src="app.js"></script>
</body>
</html>
