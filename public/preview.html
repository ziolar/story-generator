<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>游戏编辑器</title>
<link rel="stylesheet" href="/preview.css">
</head>
<body>
<div class="editor-wrap">

  <!-- 顶部工具栏 -->
  <div class="toolbar">
    <button class="tb-btn" onclick="history.back()">◀ 返回</button>
    <h1 id="preview-title" class="tb-title">游戏编辑器</h1>
    <div class="tb-actions">
      <div id="gen-progress-wrap" class="gen-progress-wrap" style="display:none">
        <div id="gen-progress-bar" class="gen-progress-bar"></div>
        <span id="gen-progress-text" class="gen-progress-text">0/0</span>
      </div>
      <span id="save-indicator" class="save-indicator"></span>
      <button class="tb-btn" id="btn-gen-all" onclick="genAll()">◎ 全部生成</button>
      <button class="tb-btn tb-play" id="btn-play" onclick="goPlay()">▶ 游玩</button>
      <button class="tb-btn tb-save" id="btn-save" onclick="saveGame()">💾 保存</button>
    </div>
  </div>

  <!-- 主体：左导航 + 右内容 -->
  <div class="editor-body">

    <!-- 左侧导航 -->
    <nav class="editor-nav" id="editor-nav">
      <div class="nav-section-label">游戏信息</div>
      <div class="nav-item active" data-panel="info">① 基本信息</div>
      <div class="nav-section-label">图片资产</div>
      <div class="nav-item" data-panel="portraits">② 角色立绘</div>
      <div class="nav-item" data-panel="scenes">③ 场景背景</div>
      <div class="nav-section-label">剧情结构</div>
      <div class="nav-item" data-panel="story">④ 故事线</div>
      <div class="nav-item" data-panel="branch">⑤ 逻辑分支</div>
      <div class="nav-section-label">游戏元素</div>
      <div class="nav-item" data-panel="gacha">⑥ 抽卡池</div>
      <div class="nav-item" data-panel="cards">⑦ 档案卡</div>
      <div class="nav-item" data-panel="endings">⑧ 结局</div>
    </nav>

    <!-- 右侧内容区 -->
    <main class="editor-main" id="editor-main">
      <div class="loading-placeholder">加载中…</div>
    </main>

  </div>
</div>

<script src="/imgcache.js"></script>
<script src="/preview.js"></script>
</body>
</html>
