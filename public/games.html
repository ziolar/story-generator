<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>我的故事 — 故事引擎</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0806;--surface:#1a1610;--surface2:#2a2218;
  --text:#f0ece4;--text2:rgba(240,236,228,.6);--accent:#e94560;--gold:#e8c97a;
  --border:rgba(232,201,122,.25);
}
body{
  font-family:'PingFang SC','Hiragino Sans GB',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;
}

/* Header */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--bg);z-index:10;
  backdrop-filter:blur(8px);
}
.header-logo{font-size:20px;font-weight:700;letter-spacing:3px;color:var(--gold);
  text-shadow:2px 2px 0 var(--accent)}
.header-subtitle{font-size:12px;color:var(--text2);letter-spacing:1px;margin-top:2px}
.btn-new{background:var(--accent);border:none;color:#fff;
  padding:9px 20px;font-family:inherit;font-size:13px;letter-spacing:2px;
  cursor:pointer;border-radius:2px;text-decoration:none;display:inline-block;
  box-shadow:3px 3px 0 #a01030;transition:transform .1s,box-shadow .1s}
.btn-new:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 #a01030}
.btn-new:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #a01030}

/* Main */
.main{max-width:960px;margin:0 auto;padding:28px 20px 60px}
.page-title{font-size:13px;letter-spacing:3px;color:var(--text2);margin-bottom:20px}

/* Grid */
.games-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:16px;
}

/* Card */
.game-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;overflow:hidden;
  transition:border-color .2s,transform .15s;
  cursor:pointer;
}
.game-card:hover{border-color:var(--gold);transform:translateY(-2px)}

.card-cover{
  height:120px;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.card-cover-icon{font-size:32px;opacity:.5}
.card-cover-count{
  position:absolute;bottom:6px;right:8px;
  font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.5px;
}

.card-body{padding:12px 14px 10px}
.card-title{
  font-size:14px;font-weight:600;letter-spacing:.05em;
  color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:4px;
}
.card-time{font-size:11px;color:var(--text2);letter-spacing:.5px}

.card-actions{
  display:flex;gap:0;border-top:1px solid var(--surface2);
}
.card-btn{
  flex:1;background:none;border:none;color:var(--text2);
  padding:10px 8px;font-family:inherit;font-size:12px;
  cursor:pointer;letter-spacing:.5px;transition:background .15s,color .15s;
  text-align:center;
}
.card-btn:hover{background:var(--surface2);color:var(--text)}
.card-btn.play:hover{color:var(--gold)}
.card-btn.del:hover{color:var(--accent)}
.card-btn + .card-btn{border-left:1px solid var(--surface2)}

/* States */
.empty-state{
  text-align:center;padding:80px 20px;color:var(--text2);
}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.4}
.empty-text{font-size:14px;letter-spacing:1px;margin-bottom:20px}
.loading{text-align:center;padding:60px 20px;color:var(--text2);
  font-size:13px;letter-spacing:2px}

/* Responsive */
@media(max-width:480px){
  .games-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .main{padding:20px 14px 40px}
  .header{padding:16px}
}
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="header-logo">故事引擎</div>
    <div class="header-subtitle">我的故事</div>
  </div>
  <a href="/" class="btn-new">＋ 新建故事</a>
</header>

<main class="main">
  <div class="page-title">已生成的视觉小说</div>
  <div id="games-grid" class="games-grid">
    <div class="loading">加载中<span id="dots">…</span></div>
  </div>
</main>

<script>
// Relative time helper
function relativeTime(ts) {
  const diff = Date.now() - ts;
  const min = Math.floor(diff / 60000);
  const hr = Math.floor(diff / 3600000);
  const day = Math.floor(diff / 86400000);
  if (min < 1) return '刚刚';
  if (min < 60) return min + '分钟前';
  if (hr < 24) return hr + '小时前';
  if (day < 30) return day + '天前';
  return new Date(ts).toLocaleDateString('zh-CN', {month:'numeric',day:'numeric'});
}

// Cover gradient based on id hash
function coverGradient(id) {
  let h = 0;
  for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) & 0xffffffff;
  const hue1 = Math.abs(h) % 360;
  const hue2 = (hue1 + 40) % 360;
  return `linear-gradient(135deg, hsl(${hue1},30%,14%) 0%, hsl(${hue2},40%,20%) 100%)`;
}

function renderGames(games) {
  const grid = document.getElementById('games-grid');
  if (!games.length) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">📖</div>
        <div class="empty-text">还没有故事，去创作第一个吧</div>
        <a href="/" class="btn-new" style="display:inline-block;text-decoration:none;padding:10px 24px;border:1px solid var(--gold);color:var(--gold);font-family:inherit;font-size:13px;letter-spacing:2px;background:none;cursor:pointer;">开始创作</a>
      </div>`;
    return;
  }
  grid.innerHTML = games.map(g => `
    <div class="game-card" data-id="${g.id}">
      <div class="card-cover" style="background:${coverGradient(g.id)}">
        <div class="card-cover-icon">📖</div>
        <div class="card-cover-count">${g.storylineCount} 条故事线 · ${g.characterCount} 位角色</div>
      </div>
      <div class="card-body">
        <div class="card-title" title="${g.title}">${g.title}</div>
        <div class="card-time">${relativeTime(g.savedAt)}</div>
      </div>
      <div class="card-actions">
        <button class="card-btn play" onclick="playGame('${g.id}')">▶ 游玩</button>
        <button class="card-btn del" onclick="deleteGame('${g.id}', this)">删除</button>
      </div>
    </div>`).join('');
}

function playGame(id) {
  window.location.href = '/play/' + id;
}

async function deleteGame(id, btn) {
  if (!confirm('确定删除这个故事吗？')) return;
  btn.textContent = '删除中…'; btn.disabled = true;
  try {
    const res = await fetch('/api/games/' + id, { method: 'DELETE' });
    if (!res.ok) throw new Error();
    // Remove card from DOM
    const card = document.querySelector('.game-card[data-id="' + id + '"]');
    if (card) card.remove();
    // If grid is now empty, re-render empty state
    if (!document.querySelector('.game-card')) renderGames([]);
  } catch {
    btn.textContent = '删除';
    btn.disabled = false;
    alert('删除失败，请重试');
  }
}

// Load games
fetch('/api/games')
  .then(r => r.json())
  .then(games => renderGames(games))
  .catch(() => {
    document.getElementById('games-grid').innerHTML =
      '<div class="empty-state" style="grid-column:1/-1"><div class="empty-text">加载失败，请刷新重试</div></div>';
  });
</script>
</body>
</html>
