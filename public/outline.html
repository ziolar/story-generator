<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>故事大纲编辑</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0806;--surface:#1a1610;--surface2:#2a2218;
  --text:#f0ece4;--text2:rgba(240,236,228,.6);--accent:#e94560;--gold:#e8c97a;
  --border:rgba(232,201,122,.25);
}
body{font-family:'PingFang SC','Hiragino Sans GB',system-ui,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh}

/* ── Top bar ── */
.topbar{position:sticky;top:0;z-index:20;background:var(--bg);
  border-bottom:1px solid var(--surface2);
  display:flex;align-items:center;gap:10px;padding:12px 16px}
.btn-back{background:none;border:1px solid var(--surface2);color:var(--text2);
  padding:6px 12px;cursor:pointer;font-family:inherit;font-size:13px;
  letter-spacing:.5px;flex-shrink:0;border-radius:3px}
.btn-back:hover{border-color:var(--gold);color:var(--gold)}
#outline-title-input{flex:1;background:transparent;border:none;color:var(--gold);
  font-family:inherit;font-size:16px;font-weight:700;letter-spacing:2px;outline:none;
  min-width:0}
#outline-title-input::placeholder{color:var(--text2)}
.btn-gen-storylines{background:var(--accent);border:none;color:#fff;
  padding:8px 18px;cursor:pointer;font-family:inherit;font-size:13px;
  letter-spacing:1px;flex-shrink:0;border-radius:3px;
  box-shadow:3px 3px 0 #a01030;transition:transform .1s,box-shadow .1s}
.btn-gen-storylines:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 #a01030}
.btn-gen-storylines:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #a01030}
.btn-gen-storylines:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:3px 3px 0 #a01030}

/* ── Content ── */
.content{max-width:640px;margin:0 auto;padding:20px 16px 80px}

/* ── Section headers ── */
.section-header{display:flex;align-items:center;gap:8px;margin:28px 0 12px}
.section-title{font-size:11px;letter-spacing:3px;color:var(--gold);
  border:1px solid var(--border);padding:3px 10px}
.section-count{font-size:11px;color:var(--text2)}

/* ── Chapter accordion ── */
.chapter-item{background:var(--surface);border:1px solid var(--surface2);
  margin-bottom:8px;border-radius:2px}
.chapter-head{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;
  user-select:none}
.chapter-head:hover{background:var(--surface2)}
.chapter-num{font-size:10px;color:var(--text2);flex-shrink:0;width:24px}
.chapter-title-input{flex:1;background:transparent;border:none;color:var(--text);
  font-family:inherit;font-size:14px;outline:none;cursor:text;min-width:0}
.chapter-title-input:focus{color:var(--gold)}
.chapter-toggle{font-size:11px;color:var(--text2);flex-shrink:0;
  transition:transform .2s;width:16px;text-align:center}
.chapter-toggle.open{transform:rotate(180deg)}
.chapter-body{display:none;padding:0 14px 12px;border-top:1px solid var(--surface2)}
.chapter-body.open{display:block}

.summary-label{font-size:10px;color:var(--text2);letter-spacing:1px;margin:10px 0 4px}
.summary-input{width:100%;background:#0f0d0a;border:1px solid var(--surface2);
  color:var(--text);font-family:inherit;font-size:13px;padding:8px;
  resize:vertical;outline:none;line-height:1.6;min-height:48px;border-radius:2px}
.summary-input:focus{border-color:var(--gold)}

.plot-label{font-size:10px;color:var(--text2);letter-spacing:1px;margin:10px 0 6px}
.plot-list{display:flex;flex-direction:column;gap:4px}
.plot-row{display:flex;align-items:center;gap:6px}
.plot-num{font-size:10px;color:var(--text2);flex-shrink:0;width:18px}
.plot-input{flex:1;background:#0f0d0a;border:1px solid var(--surface2);
  color:var(--text);font-family:inherit;font-size:13px;padding:7px 10px;
  outline:none;border-radius:2px;min-width:0}
.plot-input:focus{border-color:var(--gold)}
.btn-del-plot{background:none;border:none;color:rgba(233,69,96,.5);
  cursor:pointer;font-size:14px;padding:2px 4px;flex-shrink:0;line-height:1}
.btn-del-plot:hover{color:var(--accent)}
.btn-add-plot{background:none;border:1px dashed var(--surface2);color:var(--text2);
  padding:5px 10px;cursor:pointer;font-family:inherit;font-size:11px;
  letter-spacing:.5px;margin-top:6px;width:100%;border-radius:2px}
.btn-add-plot:hover{border-color:var(--gold);color:var(--gold)}

/* ── Characters ── */
.char-card{background:var(--surface);border:1px solid var(--surface2);
  margin-bottom:12px;padding:16px;border-radius:2px}
.char-card-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.char-portrait-thumb{width:56px;height:56px;background:var(--surface2);
  border-radius:4px;object-fit:cover;flex-shrink:0;display:flex;
  align-items:center;justify-content:center;font-size:20px;color:var(--text2);
  overflow:hidden}
.char-portrait-thumb img{width:100%;height:100%;object-fit:cover}
.char-basic{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
.char-row-inline{display:flex;gap:6px;flex-wrap:wrap}
.char-field{background:#0f0d0a;border:1px solid var(--surface2);
  color:var(--text);font-family:inherit;font-size:12px;padding:5px 8px;
  outline:none;border-radius:2px;min-width:0}
.char-field:focus{border-color:var(--gold)}
.char-field.f-name{width:72px;font-weight:600}
.char-field.f-gender{width:52px}
.char-field.f-era{flex:1;min-width:80px}
.char-field.f-personality{width:100%;font-size:12px}

.char-textarea-label{font-size:10px;color:var(--text2);letter-spacing:1px;margin:10px 0 4px}
.char-textarea{width:100%;background:#0f0d0a;border:1px solid var(--surface2);
  color:var(--text);font-family:inherit;font-size:13px;padding:8px;
  resize:vertical;outline:none;line-height:1.6;min-height:56px;border-radius:2px}
.char-textarea:focus{border-color:var(--gold)}

.char-portrait-area{margin-top:12px;display:flex;align-items:flex-start;gap:10px}
.char-portrait-preview{width:80px;height:110px;background:var(--surface2);
  border-radius:4px;overflow:hidden;flex-shrink:0;display:flex;
  align-items:center;justify-content:center;color:var(--text2);font-size:11px;
  text-align:center;line-height:1.4}
.char-portrait-preview img{width:100%;height:100%;object-fit:cover}
.char-portrait-right{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
.btn-gen-portrait{background:none;border:1px solid var(--surface2);color:var(--text2);
  padding:6px 10px;cursor:pointer;font-family:inherit;font-size:11px;
  letter-spacing:.5px;width:100%;border-radius:2px}
.btn-gen-portrait:hover{border-color:var(--gold);color:var(--gold)}
.btn-gen-portrait:disabled{opacity:.5;cursor:not-allowed}
.portrait-status{font-size:10px;color:var(--text2);letter-spacing:.5px}

/* ── Bottom fixed bar ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:20;
  background:var(--bg);border-top:1px solid var(--surface2);
  padding:12px 16px;display:flex;gap:10px;align-items:center;
  max-width:640px;margin:0 auto}
.gen-error{color:var(--accent);font-size:12px;flex:1;text-align:center;letter-spacing:.5px}
.dots::after{content:'';animation:dots 1.2s steps(4) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
</style>
</head>
<body>

<div class="topbar">
  <button class="btn-back" onclick="history.back()">← 返回</button>
  <input type="text" id="outline-title-input" placeholder="故事标题">
  <button class="btn-gen-storylines" id="btn-gen-storylines" onclick="genStorylines()">
    <span id="btn-gen-text">生成故事线</span>
    <span id="btn-gen-loading" style="display:none">生成中<span class="dots"></span></span>
  </button>
</div>

<div class="content">
  <div class="section-header">
    <div class="section-title">故事大纲</div>
    <div class="section-count" id="chapter-count"></div>
  </div>
  <div id="chapters-list"></div>

  <div class="section-header" style="margin-top:36px">
    <div class="section-title">人物档案</div>
    <div class="section-count" id="char-count"></div>
  </div>
  <div id="characters-list"></div>
</div>

<div class="bottom-bar">
  <div class="gen-error hidden" id="gen-error"></div>
  <button class="btn-gen-storylines" style="width:100%;padding:12px;font-size:14px;letter-spacing:2px"
    id="btn-gen-bottom" onclick="genStorylines()">
    <span id="btn-gen-text2">生成故事线</span>
    <span id="btn-gen-loading2" style="display:none">生成中<span class="dots"></span></span>
  </button>
</div>

<script src="/imgcache.js"></script>
<script src="/outline.js"></script>
</body>
</html>
